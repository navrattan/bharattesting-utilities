name: Build Flutter Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Enable web
        run: flutter config --enable-web --no-analytics

      - name: Install core dependencies
        run: |
          cd core
          flutter pub get
          cd ..

      - name: Install app dependencies
        run: |
          cd app
          flutter pub get

      - name: Run code generation
        run: |
          cd app
          dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: |
          cd app
          flutter build web --release --base-href /

      - name: Verify build
        run: |
          echo "✅ Build completed successfully!"
          echo "📁 Build output directory: app/build/web"
          ls -la app/build/web/
          echo "📊 Build size:"
          du -sh app/build/web/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: app/build/web/
          retention-days: 30

      - name: Create deployment-ready archive
        run: |
          cd app/build/web
          tar -czf ../../../bharattesting-web-app.tar.gz .

      - name: Upload deployment archive
        uses: actions/upload-artifact@v4
        with:
          name: bharattesting-web-app
          path: bharattesting-web-app.tar.gz
          retention-days: 30
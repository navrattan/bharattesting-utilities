name: Build Main Branch

on:
  push:
    branches: [main]
  schedule:
    # Daily build at 6 AM IST (00:30 UTC)
    - cron: '30 0 * * *'

jobs:
  build-all:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd core
          dart pub get
          cd ..
          cd app
          flutter pub get

      - name: Run code generation
        run: |
          cd app
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Web Release
        run: |
          cd app
          flutter build web --release

      - name: Generate Build Report
        run: |
          cd app
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY

          # Web build size
          WEB_SIZE=$(du -sh build/web | cut -f1)
          echo "| Web | $WEB_SIZE | ✅ |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: app/build/web/
          retention-days: 30

  notify-status:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-all]
    if: always()
    steps:
      - name: Report Success
        if: needs.build-all.result == 'success'
        run: |
          echo "✅ Web build completed successfully"
          echo "Web artifact uploaded and ready for deployment"

      - name: Report Failure
        if: needs.build-all.result == 'failure'
        run: |
          echo "❌ Build failed on main branch"
          echo "This indicates a breaking change was merged"
          exit 1

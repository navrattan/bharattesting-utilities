name: Build Main Branch

on:
  push:
    branches: [main]
  schedule:
    # Daily build at 6 AM IST (00:30 UTC)
    - cron: '30 0 * * *'

jobs:
  build-all:
    name: Build All Platforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd app
          flutter pub get

      - name: Build Web Release
        run: |
          cd app
          flutter build web --release

      - name: Build Android Release APK
        run: |
          cd app
          flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        run: |
          cd app
          flutter build appbundle --release

      - name: Generate Build Report
        run: |
          cd app
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY

          # Web build size
          WEB_SIZE=$(du -sh build/web | cut -f1)
          echo "| Web | $WEB_SIZE | ✅ |" >> $GITHUB_STEP_SUMMARY

          # APK sizes
          for apk in build/app/outputs/flutter-apk/*.apk; do
            if [[ -f "$apk" ]]; then
              APK_SIZE=$(du -sh "$apk" | cut -f1)
              APK_NAME=$(basename "$apk")
              echo "| Android ($APK_NAME) | $APK_SIZE | ✅ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # AAB size
          if [[ -f "build/app/outputs/bundle/release/app-release.aab" ]]; then
            AAB_SIZE=$(du -sh build/app/outputs/bundle/release/app-release.aab | cut -f1)
            echo "| Android Bundle | $AAB_SIZE | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: app/build/web/
          retention-days: 30

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            app/build/app/outputs/flutter-apk/*.apk
            app/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  notify-status:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-all]
    if: always()
    steps:
      - name: Report Success
        if: needs.build-all.result == 'success'
        run: |
          echo "✅ All platform builds completed successfully"
          echo "Build artifacts uploaded and ready for deployment"

      - name: Report Failure
        if: needs.build-all.result == 'failure'
        run: |
          echo "❌ Build failed on main branch"
          echo "This indicates a breaking change was merged"
          exit 1

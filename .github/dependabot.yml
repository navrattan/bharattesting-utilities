version: 2
updates:
  # Core Dart package
  - package-ecosystem: "pub"
    directory: "/core"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    reviewers:
      - "navrattan"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Security updates get priority and separate PRs
      security-updates:
        patterns: ["*"]
        update-types: ["security-update"]
      # Group core business logic dependencies
      core-dependencies:
        patterns: ["image", "pdf", "archive", "csv", "yaml", "crypto"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  # Flutter app
  - package-ecosystem: "pub"
    directory: "/app"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    reviewers:
      - "navrattan"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Security updates get priority and separate PRs
      security-updates:
        patterns: ["*"]
        update-types: ["security-update"]
      # Group Flutter core packages
      flutter-core:
        patterns: ["flutter*", "go_router", "riverpod*"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Group camera and ML packages
      camera-ml:
        patterns: ["camera", "opencv_dart", "google_mlkit*"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Group file operations
      file-ops:
        patterns: ["file_picker", "share_plus", "path_provider", "permission_handler"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 2
    reviewers:
      - "navrattan"
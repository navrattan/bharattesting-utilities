<!DOCTYPE html>
<html>
<head>
    <title>CORS Debug Test</title>
</head>
<body>
    <h1>CORS Debug Test</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        // Test 1: Basic fetch
        results.innerHTML += '<h2>Test 1: Basic Fetch</h2>';
        fetch('/')
            .then(response => {
                results.innerHTML += '<p>✅ Basic fetch OK</p>';
                return response.text();
            })
            .catch(error => {
                results.innerHTML += '<p>❌ Basic fetch failed: ' + error.message + '</p>';
            });

        // Test 2: Check if it's a service worker issue
        results.innerHTML += '<h2>Test 2: Service Worker</h2>';
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
                .then(registrations => {
                    results.innerHTML += '<p>🔍 Service workers: ' + registrations.length + '</p>';
                    registrations.forEach(registration => {
                        results.innerHTML += '<p>📄 SW: ' + registration.scope + '</p>';
                    });
                })
                .catch(error => {
                    results.innerHTML += '<p>❌ Service worker check failed: ' + error.message + '</p>';
                });
        } else {
            results.innerHTML += '<p>❌ Service workers not supported</p>';
        }

        // Test 3: Check Flutter resources
        results.innerHTML += '<h2>Test 3: Flutter Resources</h2>';
        const testResources = [
            '/main.dart.js',
            '/flutter_service_worker.js',
            '/manifest.json'
        ];

        testResources.forEach(resource => {
            fetch(resource)
                .then(response => {
                    if (response.ok) {
                        results.innerHTML += '<p>✅ ' + resource + ' OK</p>';
                    } else {
                        results.innerHTML += '<p>⚠️ ' + resource + ' status: ' + response.status + '</p>';
                    }
                })
                .catch(error => {
                    results.innerHTML += '<p>❌ ' + resource + ' failed: ' + error.message + '</p>';
                });
        });

        // Test 4: Console errors
        results.innerHTML += '<h2>Test 4: Console Check</h2>';
        results.innerHTML += '<p>🔍 Check browser console (F12) for additional errors</p>';

        setTimeout(() => {
            results.innerHTML += '<h2>✅ Tests Complete</h2>';
            results.innerHTML += '<p>If you see CORS errors above, the configuration needs more work.</p>';
        }, 2000);
    </script>
</body>
</html>

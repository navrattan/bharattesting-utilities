<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="bg-gradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0969DA;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg-gradient)" stroke="#0969DA" stroke-width="8"/>

  <!-- BT Monogram -->
  <g transform="translate(512,512)">
    <!-- B -->
    <path d="M-180,-120 L-180,240 L-60,240 Q0,240 30,210 Q60,180 60,120 Q60,80 40,50 Q60,20 60,-20 Q60,-80 30,-100 Q0,-120 -60,-120 Z M-120,-60 L-60,-60 Q-20,-60 -20,-20 Q-20,20 -60,20 L-120,20 Z M-120,80 L-60,80 Q-10,80 -10,120 Q-10,180 -60,180 L-120,180 Z"
          fill="url(#text-gradient)"
          stroke="#0969DA"
          stroke-width="4"/>

    <!-- T -->
    <path d="M80,-120 L80,-60 L140,-60 L140,240 L200,240 L200,-60 L260,-60 L260,-120 Z"
          fill="url(#text-gradient)"
          stroke="#0969DA"
          stroke-width="4"/>
  </g>

  <!-- Subtle tech pattern -->
  <g opacity="0.1">
    <rect x="100" y="100" width="4" height="4" fill="#FFFFFF"/>
    <rect x="150" y="150" width="4" height="4" fill="#FFFFFF"/>
    <rect x="870" y="200" width="4" height="4" fill="#FFFFFF"/>
    <rect x="920" y="120" width="4" height="4" fill="#FFFFFF"/>
    <rect x="200" y="850" width="4" height="4" fill="#FFFFFF"/>
    <rect x="850" y="900" width="4" height="4" fill="#FFFFFF"/>
  </g>
</svg>
name: bharattesting_app
description: BharatTesting Utilities - 5 free offline developer tools
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # Core business logic
  bharattesting_core:
    path: ../core

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.3.0

  # UI Components
  lucide_icons: ^0.454.0

  # File Operations
  file_picker: ^8.1.2
  share_plus: ^10.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Camera & Image Processing
  camera: ^0.11.0+2
  opencv_dart: ^1.2.5
  google_mlkit_text_recognition: ^0.13.1

  # PDF Operations
  printing: ^5.13.2

  # Web Support
  desktop_drop: ^0.4.4

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Syntax Highlighting
  flutter_highlight: ^0.7.0

  # Archives
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

  # Testing
  patrol: ^3.12.0
  mocktail: ^1.0.4
  alchemist: ^0.7.0

  # Linting
  flutter_lints: ^5.0.0

  # Icons & Splash
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/data/
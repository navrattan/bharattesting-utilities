name: bharattesting_app
description: BharatTesting Utilities - 5 free offline developer tools
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # Core business logic
  bharattesting_core:
    path: ../core

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4

  # Routing
  go_router: ^14.3.0

  # UI Components
  lucide_icons: ^0.257.0

  # File Operations
  file_picker: ^8.1.2
  share_plus: ^10.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Camera & Image Processing
  camera: ^0.11.0+2
  opencv_dart: ^1.2.5
  google_mlkit_text_recognition: ^0.13.1

  # PDF Operations
  printing: ^5.13.2

  # Web Support
  desktop_drop: ^0.4.4

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Syntax Highlighting
  flutter_highlight: ^0.7.0

  # Archives
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_annotation: ^4.9.0

  # Testing
  patrol: ^3.12.0
  mocktail: ^1.0.4
  alchemist: ^0.7.0

  # Linting
  flutter_lints: ^5.0.0

  # Icons & Splash
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/data/

# App Icon Configuration
flutter_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    background_color: "#0D1117"
    theme_color: "#58A6FF"
  windows:
    generate: true
    icon_size: 48
  macos:
    generate: true

  # Icon file (must be 1024x1024)
  image_path: "assets/images/app_icon.png"

  # Adaptive icon (Android 8.0+)
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

  # Remove alpha channel for better compatibility
  remove_alpha_ios: true

  # Android 12+ themed icon support
  android_12:
    image_path: "assets/images/app_icon.png"
    adaptive_foreground_image: "assets/images/app_icon_foreground.png"
    adaptive_background_color: "#0D1117"
    adaptive_monochrome_image: "assets/images/app_icon_monochrome.png"

# Splash Screen Configuration
flutter_native_splash:
  # Background color (BharatTesting dark theme)
  color: "#0D1117"
  color_dark: "#0D1117"

  # App icon for splash
  image: assets/images/app_icon.png
  image_dark: assets/images/app_icon.png

  # Brand text below icon
  branding: assets/images/splash_branding.png
  branding_dark: assets/images/splash_branding.png
  branding_mode: bottom

  # Platform specific configurations
  android_12:
    image: assets/images/app_icon.png
    image_dark: assets/images/app_icon.png
    icon_background_color: "#0D1117"
    icon_background_color_dark: "#0D1117"
    branding: assets/images/splash_branding.png
    branding_dark: assets/images/splash_branding.png

  # Web splash
  web: true
  web_image_mode: center

  # iOS specific
  ios_content_mode: center

  # Center the icon and remove default Flutter branding
  android_gravity: center
  fullscreen: true

  # Info.plist modifications for iOS
  info_plist_files:
    - 'ios/Runner/Info.plist'
    /* Loading Screen Styles */
    .loading-container {

      display: flex;

      border-top: 2px solid #58A6FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }

<body>
  <!-- Loading Screen (shown until Flutter loads) -->
  <div id="loading-screen" class="loading-container">
    <div class="loading-logo">BT</div>
    <div class="loading-text">BharatTesting Utilities</div>
    <div class="loading-subtext">5 free, offline developer tools</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Flutter Configuration -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.style.display = 'none';
      }
    });

    // Flutter service worker configuration
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js?v=1');
      });
    }

    // Flutter loader configuration
    _flutter = {};
    _flutter.loader = {};
    _flutter.loader.load = function() {
      const serviceWorkerVersion = null;
      const entrypoint = './main.dart.js';

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('flutter_service_worker.js?v=' + serviceWorkerVersion);
      }

      const script = document.createElement('script');
      script.src = entrypoint;
      document.head.appendChild(script);
    };

    // Start Flutter when page loads
    window.addEventListener('load', function(ev) {
      _flutter.loader.load();
    });
  </script>
</body>

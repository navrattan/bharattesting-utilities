<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BharatTesting Utilities - 5 free, privacy-first, offline developer tools.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BharatTesting">
  <link rel="apple-touch-icon" href="favicon.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>

  <title>BharatTesting Utilities</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0D1117;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    .loading {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #58A6FF;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .text {
      margin-top: 20px;
      color: #58A6FF;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="loading"></div>
  <div class="text">BharatTesting is loading...</div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

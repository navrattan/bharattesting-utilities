  <style>
    /* Loading Screen Styles */
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0D1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #58A6FF, #0969DA);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      animation: pulse 2s infinite;
    }

    .loading-text {
      color: #58A6FF;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    .loading-subtext {
      color: #7D8590;
      font-size: 14px;
      text-align: center;
      margin-bottom: 32px;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #30363D;
      border-top: 2px solid #58A6FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Hide loading screen when Flutter is ready */
    flt-glass-pane {
      display: none;
    }
  </style>
</head>

<body>
  <!-- Loading Screen (shown until Flutter loads) -->
  <div id="loading-screen" class="loading-container">
    <div class="loading-logo">BT</div>
    <div class="loading-text">BharatTesting Utilities</div>
    <div class="loading-subtext">5 free, offline developer tools</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Flutter App Container -->
  <div id="flutter-container"></div>

  <!-- Flutter Configuration -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      // Hide loading screen when Flutter is ready
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.style.display = 'none';
      }
    });

    // Configure Flutter
    window.flutterConfiguration = {
      canvasKitBaseUrl: "https://www.gstatic.com/flutter-canvaskit/"
    };
  </script>

  <!-- Flutter Bootstrap Script -->
  <script src="flutter.js" defer></script>

  <!-- Initialize Flutter -->
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>

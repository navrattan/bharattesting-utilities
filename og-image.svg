<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <radialGradient id="bg-gradient" cx="30%" cy="30%" r="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#21262D;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79C0FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3FB950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#56D364;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Decorative Elements -->
  <circle cx="1000" cy="100" r="150" fill="url(#text-gradient)" opacity="0.1"/>
  <circle cx="200" cy="500" r="100" fill="url(#accent-gradient)" opacity="0.1"/>

  <!-- BT Logo -->
  <g transform="translate(100,150)">
    <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#text-gradient)"/>
    <text x="60" y="80" text-anchor="middle" font-family="SF Pro Display, Arial, sans-serif" font-size="64" font-weight="900" fill="#0D1117">BT</text>
  </g>

  <!-- Main Heading -->
  <text x="280" y="220" font-family="SF Pro Display, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#text-gradient)">
    BharatTesting Utilities
  </text>

  <!-- Subheading -->
  <text x="280" y="280" font-family="SF Pro Text, Arial, sans-serif" font-size="32" font-weight="600" fill="#C9D1D9">
    5 Free, Privacy-First, Offline Developer Tools
  </text>

  <!-- Tool List -->
  <g font-family="SF Pro Text, Arial, sans-serif" font-size="24" font-weight="500">
    <text x="280" y="340" fill="#7D8590">📄 Document Scanner with OCR</text>
    <text x="280" y="380" fill="#7D8590">🖼️ Image Size Reducer</text>
    <text x="280" y="420" fill="#7D8590">📚 PDF Merger</text>
    <text x="280" y="460" fill="#7D8590">🔧 String-to-JSON Converter</text>
    <text x="280" y="500" fill="#7D8590">🇮🇳 Indian Data Faker</text>
  </g>

  <!-- Bottom Badges -->
  <g transform="translate(280,540)">
    <!-- Free Badge -->
    <rect x="0" y="0" width="80" height="32" rx="16" fill="url(#accent-gradient)"/>
    <text x="40" y="22" text-anchor="middle" font-family="SF Pro Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#0D1117">FREE</text>

    <!-- Offline Badge -->
    <rect x="100" y="0" width="100" height="32" rx="16" fill="#FD7E14" opacity="0.2" stroke="#FD7E14" stroke-width="1"/>
    <text x="150" y="22" text-anchor="middle" font-family="SF Pro Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#FD7E14">OFFLINE</text>

    <!-- Open Source Badge -->
    <rect x="220" y="0" width="140" height="32" rx="16" fill="#58A6FF" opacity="0.2" stroke="#58A6FF" stroke-width="1"/>
    <text x="290" y="22" text-anchor="middle" font-family="SF Pro Text, Arial, sans-serif" font-size="14" font-weight="600" fill="#58A6FF">OPEN SOURCE</text>
  </g>

  <!-- Website URL -->
  <text x="950" y="590" text-anchor="middle" font-family="SF Pro Text, Arial, sans-serif" font-size="20" font-weight="500" fill="#58A6FF">
    bharattesting.com
  </text>
</svg>